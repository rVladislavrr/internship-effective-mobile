services:
  redis:
    image: redis:7.2-alpine
    container_name: redis_local
    hostname: redis_local
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    command: >
      redis-server
      /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: postgres_bkp_local
    hostname: postgres_bkp_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bkr
    command: >
      sh -c "alembic upgrade head &&
             gunicorn src.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 & taskiq worker src.broker:broker --fs-discover -tp "workers/tasks/*.py""
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      REDIS_USER_PASSWORD: ${REDIS_USER_PASSWORD}
      REDIS_HOST: redis
    env_file:
      - .env
    restart: unless-stopped

  postgres_test:
    image: postgres:16-alpine
    container_name: postgres_bkp_local_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER_TEST:-postgres_test}
      POSTGRES_PASSWORD: ${DB_PASS_TEST:-admin_test}
      POSTGRES_DB: ${DB_NAME_TEST:-intership_test}
    ports:
      - "127.0.0.1:${DB_PORT_TEST:-5434}:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER_TEST:-postgres_test}" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  postgres_data_test:
